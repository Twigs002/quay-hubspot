name: Fetch HubSpot Deals

# Scheduled refresh: 3× daily at 03:00 / 11:00 / 13:00 SAST so the
# dashboard reflects deal staleness across the working day (morning
# stand-up, mid-shift, just-after-lunch checkpoint). SAST is UTC+2 with
# no DST, so the UTC times are 01:00 / 09:00 / 11:00.
# Manual dispatch still available for discovery + ad-hoc reruns.

on:
  schedule:
    - cron: '0 1 * * *'    # 03:00 SAST
    - cron: '0 9 * * *'    # 11:00 SAST
    - cron: '0 11 * * *'   # 13:00 SAST
  workflow_dispatch:
    inputs:
      mode:
        description: 'discover (safe sample · uploads artifact, no commit) | aggregate (full pull · commits JSON)'
        required: true
        default: 'discover'
        type: choice
        options:
          - discover
          - aggregate
      max_deals:
        description: 'Cap on deals fetched (0 = unlimited; default 50 for a safe test)'
        required: false
        default: '50'
      throttle_ms:
        description: 'Sleep between API calls in ms (higher = gentler. Default 350 ≈ 3 req/s, way under HubSpot 10 req/s burst)'
        required: false
        default: '350'

concurrency:
  group: fetch-hubspot
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch from HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          # Cron runs have no `inputs.*` — fall back to aggregate-mode
          # full pull so the scheduled refresh always commits real data.
          MAX_DEALS:    ${{ github.event.inputs.max_deals    || '0' }}
          THROTTLE_MS:  ${{ github.event.inputs.throttle_ms  || '350' }}
          MODE:         ${{ github.event.inputs.mode         || 'aggregate' }}
        run: python scripts/fetch_hubspot.py

      # In discover mode the script writes hubspot_discovery.json — upload it
      # so we can inspect the field schema without committing to the repo.
      # Cron runs never hit this (mode defaults to aggregate above).
      - name: Upload discovery artifact
        if: ${{ github.event.inputs.mode == 'discover' }}
        uses: actions/upload-artifact@v4
        with:
          name: hubspot-discovery
          path: hubspot_discovery.json
          retention-days: 7

      # In aggregate mode the script writes data/hubspot_outdated.json — commit
      # and push it back so GH Pages picks it up automatically. Fires for
      # scheduled runs (mode falls back to aggregate) and manual aggregate
      # dispatches.
      - name: Commit + push updated JSON
        if: ${{ (github.event.inputs.mode || 'aggregate') == 'aggregate' }}
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hubspot_outdated.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "auto-update HubSpot deals $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
