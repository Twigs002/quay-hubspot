<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quay 1 · Team Insights</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pre-auth">
  <!-- Login gate — shown until a session is verified (see auth.js). PIN-pad
       styled to match the Quay 1 Performance Dashboard (quay-dashboard-v2). -->
  <div id="loginGate" class="login-gate">
    <div class="login-box">
      <img class="login-logo" src="assets/quay1-logo-white.png" alt="Quay 1 International Realty" width="200">
      <h2 class="login-title">Team Insights</h2>
      <p class="login-sub">Sign in with your username &amp; PIN — the same login you use on the other systems.</p>
      <input id="loginUser" class="login-user" type="text" autocomplete="username"
             autocapitalize="none" autocorrect="off" placeholder="username">
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
        <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <div class="login-error" id="loginError" role="alert" hidden></div>
      <div class="keypad" id="loginKeypad">
        <button class="key" data-d="1">1</button>
        <button class="key" data-d="2">2</button>
        <button class="key" data-d="3">3</button>
        <button class="key" data-d="4">4</button>
        <button class="key" data-d="5">5</button>
        <button class="key" data-d="6">6</button>
        <button class="key" data-d="7">7</button>
        <button class="key" data-d="8">8</button>
        <button class="key" data-d="9">9</button>
        <button class="key alt" data-back>← Back</button>
        <button class="key" data-d="0">0</button>
        <button class="key alt" data-clear>Clear</button>
      </div>
      <p class="login-foot">Admin &amp; broker access only.</p>
    </div>
  </div>

  <header class="topbar">
    <div class="bar-inner">
      <div class="topbar-left">
        <img class="brand-logo" src="assets/quay1-logo-white.png"
             alt="Quay 1 International Realty" width="277" height="120">
        <div class="topbar-divider" aria-hidden="true"></div>
        <div class="topbar-titles">
          <h1>Team Insights</h1>
          <p>HubSpot deals · division directory · refreshed 3× daily</p>
        </div>
      </div>
      <div class="topbar-right">
        <span id="topbarRefresh"></span>
        <button type="button" id="signOutBtn" class="signout-btn" hidden>
          <span class="signout-who" id="signOutWho"></span>Sign out
        </button>
      </div>
    </div>
  </header>
  <nav class="tab-nav" id="tabNav" aria-label="Dashboard sections">
    <div class="bar-inner">
      <button class="tab-btn active" data-tab="deals">Deals</button>
      <button class="tab-btn" data-tab="directory">Directory</button>
      <button class="tab-btn" data-tab="recruitment">Recruitment</button>
    </div>
  </nav>
  <main id="content" class="main"></main>
  <div id="modalHost"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
